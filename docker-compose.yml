services:
  postgres:
    image: postgres:16-alpine
    container_name: sinfleet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sinfleet_erp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sinfleet-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres-data:
